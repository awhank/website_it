<div class="container-fluid bg-secondary px-0">
    <div class="row g-0">
        <div class="col-lg-6 py-6 px-5">
            <h1 class="display-5 mb-4">Hubungi Unit Teknologi Informasi</h1>
            <h4 class="lh-base mb-4">Silakan hubungi kami melalui form di bawah ini atau langsung datang ke kantor Unit Teknologi Informasi.</h4>
            <form>
                <div class="row g-3">
                    <div class="col-6">

                        </div>
                    </div>
                    <div class="col-6">
                        <div class="form-floating">

                    <div class="col-12">
                        <div class="form-floating">

                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-floating">
                            <textarea class="form-control" placeholder="Pesan" id="form-floating-4" style="height: 150px"></textarea>
                            <label for="form-floating-4">Pesan</label>
                          </div>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary w-100 py-3" type="submit">Kirim Pesan</button>
                    </div>
                </div>
